name: LLM-as-a-Judge

"on":
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: llm-as-judge-eval-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build-vector-database:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'eval')
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build retrieval vector database
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs
          {
            make -j2 run-data-collection
            make -j2 run-data-preprocessing
            make -j2 run-data-chunking
            make -j2 run-data-storage
          } 2>&1 | tee logs/data-pipeline.log

      - name: Verify retrieval artifacts
        shell: bash
        run: |
          set -euo pipefail
          for source in docs plugins discourse; do
            test -s "chatbot-core/data/embeddings/${source}_index.idx"
            test -s "chatbot-core/data/embeddings/${source}_metadata.pkl"
          done

      - name: Upload retrieval vector database
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-vector-database-${{ github.run_id }}
          path: |
            chatbot-core/data/embeddings/
            logs/data-pipeline.log
          if-no-files-found: error
          retention-days: 7

  fill-retrieval-context:
    needs: build-vector-database
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: make IS_CPU_REQ=1 setup-backend

      - name: Download retrieval vector database
        uses: actions/download-artifact@v4
        with:
          name: retrieval-vector-database-${{ github.run_id }}
          path: .

      - name: Fill retrieval_context
        run: |
          chatbot-core/venv/bin/python \
            chatbot-core/tests/eval/runners/generate_responses.py \
            --retrieval-only \
            --responses artifacts/retrieval/responses.json

      - name: Validate retrieval context
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(
              Path("chatbot-core/tests/eval/config.json").read_text(encoding="utf-8")
          )
          expected_count = config["question_count"]
          path = Path("artifacts/retrieval/responses.json")
          responses = json.loads(path.read_text(encoding="utf-8"))
          if len(responses) != expected_count:
              raise SystemExit(
                  f"Expected {expected_count} responses, found {len(responses)}"
              )
          missing = [
              entry.get("id", "<unknown>")
              for entry in responses
              if not (
                  isinstance(entry.get("retrieval_context"), list)
                  and entry["retrieval_context"]
                  and all(
                      isinstance(value, str) and value.strip()
                      for value in entry["retrieval_context"]
                  )
              )
          ]
          if missing:
              raise SystemExit("Missing retrieval context for: " + ", ".join(missing))
          PY

      - name: Upload retrieval-complete responses
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-responses-${{ github.run_id }}
          path: artifacts/retrieval/responses.json
          if-no-files-found: error
          retention-days: 7

  prepare-response-matrix:
    needs: fill-retrieval-context
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      question_count: ${{ steps.plan.outputs.question_count }}
      shard_count: ${{ steps.plan.outputs.shard_count }}
      max_parallel: ${{ steps.config.outputs.max_parallel }}
      response_model: ${{ steps.config.outputs.response_model }}
      judge_model: ${{ steps.config.outputs.judge_model }}
      response_max_tokens: ${{ steps.config.outputs.response_max_tokens }}
      response_num_ctx: ${{ steps.config.outputs.response_num_ctx }}
      response_temperature: ${{ steps.config.outputs.response_temperature }}
      judge_max_tokens: ${{ steps.config.outputs.judge_max_tokens }}
      judge_num_ctx: ${{ steps.config.outputs.judge_num_ctx }}
      metric_threshold: ${{ steps.config.outputs.metric_threshold }}

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Load eval config
        id: config
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          config = json.loads(
              Path("chatbot-core/tests/eval/config.json").read_text(encoding="utf-8")
          )
          print(f"question_count={config['question_count']}")
          print(f"shard_size={config['shard_size']}")
          print(f"max_parallel={config['max_parallel']}")
          print(f"response_model={config['response_model']}")
          print(f"judge_model={config['judge_model']}")
          print(f"response_max_tokens={config['response_max_tokens']}")
          print(f"response_num_ctx={config['response_num_ctx']}")
          print(f"response_temperature={config['response_temperature']}")
          print(f"judge_max_tokens={config['judge_max_tokens']}")
          print(f"judge_num_ctx={config['judge_num_ctx']}")
          print(f"metric_threshold={config['metric_threshold']}")
          PY

      - name: Plan response shards
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          python3 chatbot-core/tests/eval/runners/build_shard_matrix.py \
            --dataset chatbot-core/tests/eval/datasets/golden_dataset.json \
            --question-count "${{ steps.config.outputs.question_count }}" \
            --shard-size "${{ steps.config.outputs.shard_size }}" \
            --github-output "$GITHUB_OUTPUT"

  generate-responses:
    needs:
      - fill-retrieval-context
      - prepare-response-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.prepare-response-matrix.outputs.max_parallel) }}
      matrix:
        include: ${{ fromJSON(needs.prepare-response-matrix.outputs.matrix) }}
    env:
      RESULTS_DIR: artifacts/generated/shard-${{ matrix.shard }}
      RESPONSE_MODEL: ${{ needs.prepare-response-matrix.outputs.response_model }}
      JUDGE_MODEL: ${{ needs.prepare-response-matrix.outputs.judge_model }}
      DEEPEVAL_DISABLE_DOTENV: "1"
      DEEPEVAL_TELEMETRY_OPT_OUT: "1"
      DEEPEVAL_PER_TASK_TIMEOUT_SECONDS_OVERRIDE: "900"
      DEEPEVAL_JUDGE_NUM_CTX: ${{ needs.prepare-response-matrix.outputs.judge_num_ctx }}
      DEEPEVAL_JUDGE_NUM_PREDICT: ${{ needs.prepare-response-matrix.outputs.judge_max_tokens }}

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: chatbot-core/tests/eval/requirements-eval.txt

      - name: Install backend dependencies
        run: make IS_CPU_REQ=1 setup-backend

      - name: Initialize shard results
        run: mkdir -p "$RESULTS_DIR"

      - name: Install evaluation dependencies
        run: |
          python3 -m pip install -r chatbot-core/tests/eval/requirements-eval.txt \
            2>&1 | tee "$RESULTS_DIR/dependency-install.log"

      - name: Download retrieval-context responses
        uses: actions/download-artifact@v4
        with:
          name: retrieval-responses-${{ github.run_id }}
          path: artifacts/retrieval

      - name: Install Ollama
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://ollama.com/install.sh -o /tmp/install-ollama.sh
          sh /tmp/install-ollama.sh 2>&1 | tee "$RESULTS_DIR/ollama-install.log"

      - name: Start Ollama service
        shell: bash
        run: |
          set -euo pipefail
          nohup ollama serve > "$RESULTS_DIR/ollama-server.log" 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:11434/api/tags > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Ollama did not become ready within 60 seconds." >&2
          exit 1

      - name: Pull response and judge models
        run: |
          ollama pull "$RESPONSE_MODEL" 2>&1 | tee "$RESULTS_DIR/response-model-pull.log"
          ollama pull "$JUDGE_MODEL" 2>&1 | tee "$RESULTS_DIR/judge-model-pull.log"

      - name: Generate responses for shard
        id: generation
        shell: bash
        run: |
          set -euo pipefail
          chatbot-core/venv/bin/python \
            chatbot-core/tests/eval/runners/generate_responses.py \
            --generation-only \
            --source-responses artifacts/retrieval/responses.json \
            --responses "$RESULTS_DIR/responses.json" \
            --response-model "$RESPONSE_MODEL" \
            --max-tokens '${{ needs.prepare-response-matrix.outputs.response_max_tokens }}' \
            --num-ctx '${{ needs.prepare-response-matrix.outputs.response_num_ctx }}' \
            --temperature '${{ needs.prepare-response-matrix.outputs.response_temperature }}' \
            --offset '${{ matrix.offset }}' \
            --limit '${{ matrix.limit }}' \
            2>&1 | tee "$RESULTS_DIR/generation.log"

      - name: Validate generated shard
        id: validation
        run: |
          python3 chatbot-core/tests/eval/runners/validate_responses.py \
            "$RESULTS_DIR/responses.json" \
            --expected-count '${{ matrix.limit }}' \
            2>&1 | tee "$RESULTS_DIR/validation.log"

      - name: Evaluate generated shard
        id: evaluation
        shell: bash
        run: |
          set -euo pipefail
          python3 chatbot-core/tests/eval/runners/run_evaluation.py \
            --responses "$RESULTS_DIR/responses.json" \
            --goldens chatbot-core/tests/eval/datasets/golden_dataset.json \
            --output-dir "$RESULTS_DIR" \
            --response-model "$RESPONSE_MODEL" \
            --judge-model "$JUDGE_MODEL" \
            --expected-count '${{ matrix.limit }}' \
            --threshold '${{ needs.prepare-response-matrix.outputs.metric_threshold }}' \
            --identifier "chatbot-${{ github.run_id }}-shard-${{ matrix.shard }}" \
            2>&1 | tee "$RESULTS_DIR/deepeval.log"

      - name: Upload shard outputs and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: response-shard-${{ matrix.shard }}
          path: ${{ env.RESULTS_DIR }}/
          if-no-files-found: error
          retention-days: 14

  merge-responses:
    needs:
      - prepare-response-matrix
      - generate-responses
    runs-on: ubuntu-24.04

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Download retrieval-context responses
        uses: actions/download-artifact@v4
        with:
          name: retrieval-responses-${{ github.run_id }}
          path: artifacts/retrieval

      - name: Download generated response shards
        uses: actions/download-artifact@v4
        with:
          pattern: response-shard-*
          path: artifacts/shards

      - name: Aggregate responses and evaluation results
        id: aggregate
        run: |
          python3 chatbot-core/tests/eval/runners/aggregate_evaluations.py \
            --source artifacts/retrieval/responses.json \
            --shards-dir artifacts/shards \
            --output-dir artifacts/combined \
            --question-count '${{ needs.prepare-response-matrix.outputs.question_count }}' \
            --expected-shards '${{ needs.prepare-response-matrix.outputs.shard_count }}'

      - name: Publish evaluation report
        if: always()
        run: |
          if [[ -f artifacts/combined/evaluation-report.md ]]; then
            cat artifacts/combined/evaluation-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload combined responses
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-responses-${{ github.run_id }}
          path: artifacts/combined/
          if-no-files-found: error
          retention-days: 14
